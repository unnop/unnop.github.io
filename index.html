<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages</title>
    <script src="https://iam.kingpower.com/js/keycloak.js"></script>
</head>
<body>

    <div id="loading">กำลังตรวจสอบสิทธิ์...</div>

    <div id="content" style="display: none;">
        <h1>ยินดีต้อนรับเข้าสู่ระบบ (GitHub Pages)</h1>
        <p>สวัสดีคุณ: <strong id="username"></strong></p>
        <p>อีเมล: <span id="email"></span></p>
        
        <button onclick="keycloak.logout()">ออกจากระบบ (Logout)</button>
        
        <hr>
        <h3>Token สำหรับเอาไปยิงหา API หลังบ้าน:</h3>
        <textarea id="token" rows="10" cols="80" readonly></textarea>
    </div>

    <script>
        // 2. ตั้งค่าการเชื่อมต่อไปยัง Keycloak เซิร์ฟเวอร์ของคุณ
        const keycloak = new Keycloak({
            url: 'https://iam.kingpower.com', 
            realm: 'f1-bof',                
            clientId: 'github-auth'          
        });

        // 3. สั่งให้ Keycloak เริ่มทำงานตอนโหลดหน้าเว็บ
        keycloak.init({ 
            onLoad: 'login-required', 
            checkLoginIframe: false   
        }).then(function(authenticated) {
            if (authenticated) {
                // [แก้ไขจุดที่พัง]: ปิดปีกกาของ if (authenticated) ให้ครบถ้วนก่อนส่งหน้าไป greeting/
                sessionStorage.setItem('access_token', keycloak.token);
                sessionStorage.setItem('username', keycloak.tokenParsed.preferred_username);

                // สั่ง Redirect ไปยัง sub folder
                window.location.href = 'greeting/';
            } else {
                // กรณีหลุดสิทธิ์ (เผื่อไว้)
                document.getElementById('loading').innerText = 'ไม่ได้รับอนุญาตให้เข้าใช้งาน';
            }
        }).catch(function(error) {
            console.error('Keycloak Init Error:', error); // พิมพ์ Error ลง Console เผื่อใช้ไล่เช็ก
            document.getElementById('loading').innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อกับระบบยืนยันตัวตน';
        });
    </script>
</body>
</html>
