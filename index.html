<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages + Keycloak Test</title>
    <!-- 1. ดึง Keycloak JS Adapter มาใช้งาน (แนะนำให้ใช้เวอร์ชันเดียวกับเซิร์ฟเวอร์ Keycloak ของคุณ) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/keycloak/24.0.5/keycloak.min.js"></script>
</head>
<body>

    <!-- หน้าจอตอนที่ยังโหลดสิทธิ์ไม่เสร็จ -->
    <div id="loading">กำลังตรวจสอบสิทธิ์...</div>

    <!-- หน้าจอหลักที่จะแสดงผลหลังจากล็อกอินผ่าน Keycloak (ที่เชื่อม AD) แล้วเท่านั้น -->
    <div id="content" style="display: none;">
        <h1>ยินดีต้อนรับเข้าสู่ระบบ (GitHub Pages)</h1>
        <p>สวัสดีคุณ: <strong id="username"></strong></p>
        <p>อีเมล: <span id="email"></span></p>
        
        <button onclick="keycloak.logout()">ออกจากระบบ (Logout)</button>
        
        <hr>
        <h3>Token สำหรับเอาไปยิงหา API หลังบ้าน:</h3>
        <textarea id="token" rows="10" cols="80" readonly></textarea>
    </div>

    <script>
        // 2. ตั้งค่าการเชื่อมต่อไปยัง Keycloak เซิร์ฟเวอร์ของคุณ
        const keycloak = new Keycloak({
            url: 'https://keycloak.yourcompany.com', // URL ของ Keycloak Server
            realm: 'your-realm-name',                // ชื่อ Realm
            clientId: 'github-pages-client'          // ชื่อ Client ID ที่สร้างไว้ใน Keycloak
        });

        // 3. สั่งให้ Keycloak เริ่มทำงานตอนโหลดหน้าเว็บ
        keycloak.init({ 
            onLoad: 'login-required', // บังคับว่าถ้ายังไม่ได้ล็อกอิน ต้องเด้งไปหน้า Login ทันที
            checkLoginIframe: false   // ปิดใช้งาน iframe check เพื่อลดปัญหากับบล็อกเกอร์บางตัว
        }).then(function(authenticated) {
            if (authenticated) {
                // ถ้าล็อกอินสำเร็จแล้ว ให้ซ่อนหน้า Loading แล้วโชว์เนื้อหาเว็บ
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                // ดึงข้อมูลผู้ใช้ (ที่ดึงมาจาก Active Directory อีกที) มาแสดงบนหน้าเว็บ
                document.getElementById('username').innerText = keycloak.tokenParsed.preferred_username || 'User';
                document.getElementById('email').innerText = keycloak.tokenParsed.email || 'No Email';
                
                // โชว์ Access Token (JWT) เผื่อคุณจะเอาไปใช้ยิง API หลังบ้านต่อ
                document.getElementById('token').value = keycloak.token;
            }
        }).catch(function() {
            document.getElementById('loading').innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อกับระบบยืนยันตัวตน';
        });
    </script>
</body>
</html>
